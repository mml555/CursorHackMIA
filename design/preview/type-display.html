<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:26px 30px;position:relative;overflow:hidden}
  .wrap::before{content:"";position:absolute;top:-40%;right:-5%;width:420px;height:420px;background:radial-gradient(ellipse at center,rgba(240,165,0,.07),transparent 60%);pointer-events:none}
  .ey{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:14px}
  .xl{font-size:60px;font-weight:300;line-height:1.0;letter-spacing:-0.03em;color:var(--text-1);margin:0}
  .xl em{font-style:italic;font-weight:300;color:var(--text-2)}
  .xl b{font-weight:600}
  .scale{display:flex;align-items:baseline;gap:18px;margin-top:22px;flex-wrap:wrap}
  .spec{display:flex;align-items:baseline;gap:10px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-3)}
  .h1{font-size:34px;font-weight:600;letter-spacing:-0.02em;color:var(--text-1)}
  .h2{font-size:24px;font-weight:500;letter-spacing:-0.01em;color:var(--text-1)}
  .h3{font-size:18px;font-weight:600;color:var(--text-1)}
</style></head>
<body><div class="wrap">
  <div class="ey">Inter · 300 → 700</div>
  <h1 class="xl">Trade what you <b>have</b><em> for what you need</em></h1>
  <div class="scale">
    <span class="spec"><span class="tag">H1 600</span><span class="h1">Member Network</span></span>
    <span class="spec"><span class="tag">H2 500</span><span class="h2">Why this match</span></span>
    <span class="spec"><span class="tag">H3 600</span><span class="h3">Sunrise Yoga</span></span>
  </div>
</div></body></html>
