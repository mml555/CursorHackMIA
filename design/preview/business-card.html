<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:22px 28px}
  .card{background:var(--obsidian);border:1px solid var(--hairline);border-radius:14px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.4);max-width:380px}
  .top{display:flex;align-items:center;gap:12px}
  .logo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2a2d35,#1e2026);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--amber);font-size:18px;flex:none}
  .name{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:5px;background:#14532D;color:#22C55E;border-radius:999px;padding:3px 9px 3px 7px;font-size:11px;font-weight:600}
  .badge svg{width:11px;height:11px}
  .tag{display:inline-block;background:var(--surface-raised);color:var(--text-2);border-radius:6px;padding:3px 9px;font-size:12px;margin-top:10px}
  .line{font-size:14px;margin-top:10px}
  .line .k{color:var(--text-3)}
  .line .v{color:var(--text-1)}
  .score{margin-top:14px;font-family:var(--font-mono);color:var(--amber);font-size:13px}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="top"><div class="logo">L</div><div><div class="name">Luminary Studio <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Vetted</span></div></div></div>
    <span class="tag">Photography</span>
    <div class="line"><span class="k">Trading</span> &nbsp;<span class="v">Brand &amp; product photography</span></div>
    <div class="line"><span class="k">Looking for</span> &nbsp;<span class="v">Team wellness sessions</span></div>
    <div class="score">Outcome score 4.8 · 31 trades</div>
  </div>
</div></body></html>
