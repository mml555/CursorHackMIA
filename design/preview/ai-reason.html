<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:22px 24px}
  /* soft inset, no hard frame — a thought, not a form field */
  .reason{position:relative;background:rgba(45,212,170,.035);border-radius:12px;padding:15px 18px 15px 20px;max-width:560px}
  /* thin organic reasoning rail */
  .rail{position:absolute;left:0;top:14px;bottom:14px;width:2px;border-radius:2px;background:linear-gradient(180deg,var(--teal),rgba(45,212,170,.15))}
  .head{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:nowrap}
  .spark{width:14px;height:14px;color:var(--teal);flex:none}
  .lbl{font-family:var(--font-mono);color:var(--teal);font-size:11px;letter-spacing:.06em;white-space:nowrap}
  .think{display:inline-flex;gap:3px;margin-left:2px}
  .think i{width:3px;height:3px;border-radius:50%;background:var(--teal);opacity:.5;animation:tw 1.4s ease-in-out infinite}
  .think i:nth-child(2){animation-delay:.2s}.think i:nth-child(3){animation-delay:.4s}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:.9}}
  .txt{font-family:var(--font-mono);color:var(--text-1);font-size:13px;line-height:1.75}
  .txt .em{color:var(--text-2)}
  .cur{display:inline-block;width:7px;height:13px;background:var(--amber);vertical-align:-2px;margin-left:2px;animation:bl 1.1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
</style></head>
<body><div class="wrap">
  <div class="reason">
    <span class="rail"></span>
    <div class="head">
      <svg class="spark" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg>
      <span class="lbl">why this match</span>
      <span class="think"><i></i><i></i><i></i></span>
    </div>
    <div class="txt">Luminary Studio offers brand photography for small businesses and needs weekly wellness sessions for a team of 6. <span class="em">Your class format and their session format match in value and frequency.</span><span class="cur"></span></div>
  </div>
</div></body></html>
