<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:24px 28px;display:flex;gap:28px;align-items:stretch}
  /* left: live hierarchy specimen */
  .demo{flex:1.3;background:var(--obsidian);border:1px solid var(--hairline);border-radius:12px;padding:20px 22px;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .ey{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#52555E}
  .tt{font-size:21px;font-weight:600;color:#F4F4F2;letter-spacing:-0.01em;margin:7px 0 6px}
  .ds{font-size:14px;line-height:1.6;color:#8C8F99}
  /* right: token rows */
  .toks{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .row{display:flex;align-items:center;gap:11px}
  .dot{width:13px;height:13px;border-radius:50%;flex:none;box-shadow:0 0 0 4px rgba(255,255,255,.03)}
  .meta{display:flex;flex-direction:column}
  .nm{font-size:13px;font-weight:600}
  .hx{font-family:var(--font-mono);font-size:11px;color:#52555E;margin-top:1px}
</style></head>
<body><div class="wrap">
  <div class="demo">
    <div class="ey">Member Network</div>
    <div class="tt">Luminary Studio</div>
    <div class="ds">Brand photography for small businesses. Vetted, with 31 completed trades across the Austin wellness network.</div>
  </div>
  <div class="toks">
    <div class="row"><span class="dot" style="background:#F4F4F2"></span><span class="meta"><span class="nm" style="color:#F4F4F2">Primary</span><span class="hx">#F4F4F2 · titles, body</span></span></div>
    <div class="row"><span class="dot" style="background:#8C8F99"></span><span class="meta"><span class="nm" style="color:#8C8F99">Secondary</span><span class="hx">#8C8F99 · support copy</span></span></div>
    <div class="row"><span class="dot" style="background:#52555E"></span><span class="meta"><span class="nm" style="color:#52555E">Tertiary</span><span class="hx">#52555E · labels, meta</span></span></div>
  </div>
</div></body></html>
