<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:20px;display:flex;gap:14px}
  .sw{flex:1;border-radius:10px;border:1px solid var(--hairline);overflow:hidden}
  .chip{height:64px;display:flex;align-items:flex-end;padding:8px}
  .tag{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.35);color:#fff}
  .meta{padding:10px 12px;background:var(--obsidian)}
  .name{font-size:13px;font-weight:600;color:var(--text-1)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#F0A500;box-shadow:inset 0 0 0 99px transparent, 0 0 20px rgba(240,165,0,.35)"></div><div class="meta"><div class="name">Amber Gold</div><div class="hex">#F0A500 · primary</div></div></div>
  <div class="sw"><div class="chip" style="background:#D49200"></div><div class="meta"><div class="name">Amber Hover</div><div class="hex">#D49200</div></div></div>
  <div class="sw"><div class="chip" style="background:#0E0F11;display:flex;align-items:center;justify-content:center"><span style="font-family:var(--font-mono);color:#2DD4AA;font-size:13px">reasoning ▌</span></div><div class="meta"><div class="name">Sage Teal</div><div class="hex">#2DD4AA · AI text only</div></div></div>
</div></body></html>
