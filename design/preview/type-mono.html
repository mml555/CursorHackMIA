<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:20px 22px;display:flex;gap:16px;align-items:stretch}

  /* ---- Match engine panel ---- */
  .term{flex:1.6;background:linear-gradient(180deg,#0c0d10,#0e1013);border:1px solid var(--hairline);
    border-radius:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.5);display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--hairline);
    background:linear-gradient(90deg,rgba(45,212,170,.06),transparent)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(45,212,170,.6);animation:pl 1.8s ease-out infinite}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(45,212,170,.5)}100%{box-shadow:0 0 0 9px rgba(45,212,170,0)}}
  .barlbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal)}
  .chip{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);border:1px solid var(--hairline);border-radius:999px;padding:3px 8px}
  .chip .d{width:5px;height:5px;border-radius:50%;background:var(--teal)}

  .body{padding:13px 16px;flex:1}
  .reason-com{font-family:var(--font-mono);color:var(--teal);font-size:11px;letter-spacing:.02em}
  .reason-txt{font-family:var(--font-mono);color:var(--text-1);font-size:12.5px;line-height:1.7;margin-top:7px}
  .cur{display:inline-block;width:7px;height:13px;background:var(--amber);vertical-align:-2px;margin-left:3px;animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}

  /* alignment footer: reciprocal motif */
  .align{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--hairline);background:rgba(255,255,255,.012)}
  .node{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10px;color:var(--text-2)}
  .av{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#2a2d35,#1e2026);font-size:9px;color:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-weight:700}
  .swap{position:relative;width:30px;height:14px}
  .swap svg{width:30px;height:14px}
  .tags{margin-left:auto;display:flex;gap:6px}
  .t{font-family:var(--font-mono);font-size:9px;color:var(--teal);border:1px solid rgba(45,212,170,.3);border-radius:5px;padding:2px 6px}

  /* ---- readout ---- */
  .readout{width:166px;flex:none;background:var(--obsidian);border:1px solid var(--hairline);border-radius:13px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;position:relative;overflow:hidden;padding:14px}
  .readout::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,rgba(240,165,0,.12),transparent 62%)}
  .ring{position:relative;width:96px;height:96px;filter:drop-shadow(0 0 16px rgba(240,165,0,.35))}
  .ring .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
  .ring .n b{font-family:var(--font-mono);font-weight:500;font-size:30px;letter-spacing:-0.02em;color:var(--amber);line-height:1}
  .ring .n span{font-family:var(--font-mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-top:3px}
  .conf{width:100%}
  .conf .ct{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--text-3);margin-bottom:5px}
  .track{height:5px;border-radius:999px;background:var(--hairline);overflow:hidden}
  .fill{height:100%;width:94%;border-radius:999px;background:linear-gradient(90deg,#D49200,#F0A500);box-shadow:0 0 10px rgba(240,165,0,.5)}
</style></head>
<body><div class="wrap">
  <div class="term">
    <div class="bar"><span class="pulse"></span><span class="barlbl">match engine</span><span class="chip"><span class="d"></span>live</span></div>
    <div class="body">
      <div class="reason-com">// why this match</div>
      <div class="reason-txt">Class and session format align in value and frequency. Both clear without cash.<span class="cur"></span></div>
    </div>
    <div class="align">
      <span class="node"><span class="av">S</span>Sunrise</span>
      <span class="swap"><svg viewBox="0 0 30 14" fill="none" stroke="#F0A500" stroke-width="1.3" stroke-linecap="round"><path d="M4 4h20M21 1l3 3-3 3"/><path d="M26 10H6M9 13l-3-3 3-3"/></svg></span>
      <span class="node"><span class="av">L</span>Luminary</span>
      <span class="tags"><span class="t">value</span><span class="t">frequency</span></span>
    </div>
  </div>

  <div class="readout">
    <div class="ring">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r="40" fill="none" stroke="#2A2D35" stroke-width="7"/>
        <circle cx="48" cy="48" r="40" fill="none" stroke="#F0A500" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="251.3" stroke-dashoffset="15.1" transform="rotate(-90 48 48)"/>
      </svg>
      <div class="n"><b>94%</b><span>Match</span></div>
    </div>
    <div class="conf">
      <div class="ct"><span>confidence</span><span>high</span></div>
      <div class="track"><div class="fill"></div></div>
    </div>
  </div>
</div></body></html>
