<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:20px;display:flex;gap:14px}
  .sw{flex:1;border-radius:10px;border:1px solid var(--hairline);overflow:hidden}
  .chip{height:64px}
  .meta{padding:10px 12px;background:var(--obsidian)}
  .name{font-size:13px;font-weight:600;color:var(--text-1)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#0E0F11"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0E0F11 · page</div></div></div>
  <div class="sw"><div class="chip" style="background:#16181C"></div><div class="meta"><div class="name">Obsidian</div><div class="hex">#16181C · card</div></div></div>
  <div class="sw"><div class="chip" style="background:#1E2026"></div><div class="meta"><div class="name">Raised</div><div class="hex">#1E2026 · inputs</div></div></div>
  <div class="sw"><div class="chip" style="background:#2A2D35"></div><div class="meta"><div class="name">Hairline</div><div class="hex">#2A2D35 · border</div></div></div>
</div></body></html>
