<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:24px}
  .bar{display:grid;grid-template-columns:1fr 1fr auto;background:linear-gradient(180deg,#1c1e24,#16181c);
    border:1px solid var(--hairline);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.45);position:relative}
  .bar::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#F0A500,#D49200);box-shadow:0 0 14px rgba(240,165,0,.45)}
  .cell{padding:16px 22px;border-right:1px solid var(--hairline);display:flex;flex-direction:column;gap:8px}
  .cell:first-child{padding-left:26px}
  .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:7px}
  .k svg{width:13px;height:13px}
  .v{font-size:17px;color:var(--text-1);font-weight:500;display:flex;align-items:center;gap:8px}
  .freq{font-family:var(--font-mono);font-size:11px;color:var(--amber);background:rgba(240,165,0,.12);border-radius:6px;padding:2px 7px;white-space:nowrap}
  .cell.right{border-right:none;justify-content:center;align-items:flex-start}
  .vetted{display:inline-flex;align-items:center;gap:6px;background:#14532D;color:#22C55E;border-radius:999px;padding:6px 13px 6px 10px;font-size:13px;font-weight:600}
  .vetted svg{width:14px;height:14px}
</style></head>
<body><div class="wrap">
  <div class="bar">
    <div class="cell">
      <div class="k"><svg viewBox="0 0 24 24" fill="none" stroke="#52555E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 7l9-4 9 4"/></svg>Offering</div>
      <div class="v">Yoga classes <span class="freq">4x / mo</span></div>
    </div>
    <div class="cell">
      <div class="k"><svg viewBox="0 0 24 24" fill="none" stroke="#52555E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>Looking for</div>
      <div class="v">Brand photography</div>
    </div>
    <div class="cell right">
      <div class="k">Status</div>
      <span class="vetted"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Vetted</span>
    </div>
  </div>
</div></body></html>
