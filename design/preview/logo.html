<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:24px 30px;display:flex;align-items:center;gap:40px}
  /* primary lockup on dark */
  .lock{display:flex;align-items:center;gap:14px}
  .lock img{width:62px;height:62px;object-fit:contain;display:block}
  .wm{display:flex;flex-direction:column;gap:2px}
  .word{font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text-1);line-height:1}
  .tag{font-size:12px;color:var(--text-2);letter-spacing:.02em}
  .div{width:1px;align-self:stretch;background:var(--hairline)}
  /* mark only */
  .markonly{display:flex;flex-direction:column;align-items:center;gap:8px}
  .markonly img{width:54px;height:54px;object-fit:contain}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-3)}
</style></head>
<body><div class="wrap">
  <div class="lock">
    <img src="../assets/reciproca-mark.png" alt="Reciproca mark">
    <div class="wm"><span class="word">Reciproca</span><span class="tag">Trusted Value Exchange</span></div>
  </div>
  <div class="div"></div>
  <div class="markonly"><img src="../assets/reciproca-mark.png" alt="mark"><span class="lbl">mark</span></div>
</div></body></html>
