<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .wrap{background:var(--ink);padding:26px 28px;display:flex;gap:34px;align-items:center}
  .badge{display:inline-flex;align-items:center;gap:6px;background:#14532D;color:#22C55E;border-radius:999px;padding:5px 12px 5px 10px;font-size:13px;font-weight:600}
  .badge svg{width:14px;height:14px}
  .stars{display:flex;gap:4px}
  .stars svg{width:28px;height:28px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-3);display:block;margin-bottom:10px}
  .num{font-family:var(--font-mono);color:var(--amber);font-size:15px;margin-left:8px}
</style></head>
<body><div class="wrap">
  <div><span class="lbl">VERIFIED BADGE</span>
    <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Vetted</span>
  </div>
  <div><span class="lbl">STAR RATING + SCORE</span>
    <span class="stars">
      <svg viewBox="0 0 24 24" fill="#F0A500"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#F0A500"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#F0A500"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#F0A500"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <svg viewBox="0 0 24 24" fill="#2A2D35"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
      <span class="num">4.9</span>
    </span>
  </div>
</div></body></html>
