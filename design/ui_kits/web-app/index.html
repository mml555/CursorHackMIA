<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reciproca — Web App UI Kit</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="TopNav.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="BrowseNetwork.jsx"></script>
  <script type="text/babel" src="Join.jsx"></script>
  <script type="text/babel" src="Matches.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [screen, setScreen] = useState("landing"); // landing | matches | network | join
      const go = (s) => { setScreen(s); window.scrollTo({ top: 0 }); };

      return (
        <div className="app" data-screen-label={screen}>
          {screen !== "landing" && <TopNav screen={screen} go={go} />}
          {screen === "landing" && (
            <>
              <LandingNav go={go} />
              <Landing go={go} />
            </>
          )}
          {screen === "matches" && <Matches go={go} />}
          {screen === "network" && <BrowseNetwork go={go} />}
          {screen === "join" && <Join go={go} />}
        </div>
      );
    }

    /* Landing has its own minimal nav (no app tabs, but Try demo is always visible) */
    function LandingNav({ go }) {
      return (
        <nav className="nav">
          <a className="brand" style={{ cursor: "pointer" }} onClick={() => go("landing")}><Mark size={24} /> Reciproca</a>
          <div className="nav-right">
            <Button variant="ghost" size="sm" onClick={() => go("matches")}>Try demo</Button>
            <Button variant="primary" size="sm" onClick={() => go("join")}>Apply to join</Button>
          </div>
        </nav>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
